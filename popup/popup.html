<!DOCTYPE html>
<html>
<head>
  <title>Fork Sync Dashboard</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; width: 320px; padding: 15px; margin: 0; color: #24292f; }
    h2 { font-size: 16px; margin-top: 0; border-bottom: 1px solid #d0d7de; padding-bottom: 10px; }
    .hidden { display: none; }
    .btn { width: 100%; padding: 5px 16px; font-size: 14px; font-weight: 500; border-radius: 6px; cursor: pointer; border: 1px solid rgba(27, 31, 36, 0.15); box-sizing: border-box; }
    .btn-primary { background-color: #2da44e; color: white; }
    .btn-primary:hover { background-color: #2c974b; }
    input[type="password"] { width: 100%; padding: 5px 12px; font-size: 14px; border: 1px solid #d0d7de; border-radius: 6px; margin-top: 5px; margin-bottom: 10px; box-sizing: border-box; }
    .text-small { font-size: 12px; color: #57606a; margin-top: 5px; margin-bottom: 15px; display: block; }
    .status { font-size: 13px; font-weight: bold; margin-bottom: 15px; text-align: center; }
    .success-text { color: #1a7f37; }
    .error-text { color: #cf222e; }
    
    /* Future Cron Job Section */
    .cron-section { background: #f6f8fa; padding: 10px; border-radius: 6px; margin-top: 15px; border: 1px solid #d0d7de; }
  </style>
</head>
<body>
  <h2>GitHub Fork Sync</h2>

  <!-- Container when User needs to log in -->
  <div id="setup-container">
    <label style="font-size: 14px; font-weight: 600;">Personal Access Token</label>
    <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx" />
    <span class="text-small">Needs 'repo' scope. Don't worry, stored only on your local browser.</span>
    
    <button id="save-btn" class="btn btn-primary">Connect GitHub</button>
  </div>

  <!-- Container when Token is valid -->
  <div id="dashboard-container" class="hidden">
    <div id="connection-status" class="status success-text">✅ Connected & Valid</div>
    
    <button id="reset-btn" class="btn">Update Token / Logout</button>

    <!-- Placeholder for your future Cron Job -->
    <div class="cron-section">
      <h3 style="font-size: 14px; margin-top: 0;">Auto-Sync Settings</h3>
      <span class="text-small">Coming soon: Set timers to auto-sync branches in the background!</span>
    </div>
  </div>

  <div id="message" class="status hidden" style="margin-top:10px;"></div>

  <!-- Load dependencies (must use script tags in HTML) -->
  <script src="../lib/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
